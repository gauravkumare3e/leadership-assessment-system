<!DOCTYPE html>
<html>
<head>
<title>LDC 180 Assessment Login</title>
</head>

<body style="font-family:Arial;background:#f5f5f5">

<div id="loginBox" style="width:350px;margin:100px auto;background:white;padding:30px;border-radius:10px">

<h2>LDC 180 Leadership Assessment</h2>

<p>Enter your company email to access the assessment.</p>

<input 
type="email" 
id="email" 
placeholder="Enter your company email" 
style="width:100%;padding:10px;margin-bottom:10px">

<button 
onclick="loginWithMagicLink()" 
style="width:100%;background:#2a82c9;color:white;height:40px;border-radius:8px">

Send Login Link

</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

async function checkLoginSession(){

const { data } = await supabaseClient.auth.getSession()

if(data.session){

localStorage.setItem("userEmail", data.session.user.email)

window.location.href = "assessment.html"

}

}

checkLoginSession()

</script>

<script src="script.js"></script>
</body>
</html>
